<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemma Pocket Assistant — Wikipedia</title>
  </head>
  <body>
    <script>
      /**
       * Gemma Pocket Assistant — Wikipedia Module
       * Performs a fuzzy search to get the intro, then fetches Section 0
       * HTML to parse the infobox for richer structured data.
       *
       * @param {string} topic - The search keywords (entity name only).
       * @param {string} lang  - The two-letter language code (e.g. "en").
       */
      async function fetchWikiFuzzyAndInfobox(topic, lang) {
        const baseUrl = `https://${lang}.wikipedia.org/w/api.php`;

        // Step 1: Fuzzy search → get exact title + plain-text introduction
        const searchParams = new URLSearchParams({
          action: 'query',
          format: 'json',
          generator: 'search',
          gsrsearch: topic,
          gsrlimit: '1',
          prop: 'extracts',
          explaintext: '1',
          exintro: '1',
          origin: '*',
        });

        const searchRes = await fetch(`${baseUrl}?${searchParams.toString()}`);
        if (!searchRes.ok) throw new Error(`HTTP error! status: ${searchRes.status}`);
        const searchData = await searchRes.json();

        if (!searchData.query || !searchData.query.pages) {
          return {
            error: `No Wikipedia articles found matching "${topic}" in language "${lang}".`,
          };
        }

        const pages = searchData.query.pages;
        const firstPageKey = Object.keys(pages)[0];
        const page = pages[firstPageKey];
        const title = page?.title;
        const extract = page?.extract || '';

        // Step 2: Fetch Section 0 HTML to parse the infobox table
        let infoboxText = '';
        try {
          const parseParams = new URLSearchParams({
            action: 'parse',
            page: title,
            section: '0',
            prop: 'text',
            format: 'json',
            origin: '*',
          });
          const parseRes = await fetch(`${baseUrl}?${parseParams.toString()}`);
          const parseData = await parseRes.json();
          const html = parseData?.parse?.text?.['*'];

          if (html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const infobox = doc.querySelector('table.infobox');
            if (infobox) {
              infobox.querySelectorAll('tr').forEach((row) => {
                const th = row.querySelector('th');
                const td = row.querySelector('td');
                if (th && td) {
                  const key = th.textContent.replace(/\[\d+\]/g, '').trim();
                  const value = td.textContent
                    .replace(/\[\d+\]/g, '')
                    .trim()
                    .replace(/\n+/g, ' | ');
                  infoboxText += `${key}: ${value}\n`;
                }
              });
            }
          }
        } catch (e) {
          console.warn('Gemma Pocket Assistant: infobox parse failed silently:', e);
        }

        // Step 3: Combine infobox + extract
        let finalResult = '';
        if (infoboxText) finalResult += `--- INFOBOX ---\n${infoboxText}\n\n`;
        if (extract)     finalResult += `--- SUMMARY ---\n${extract}`;

        if (!finalResult.trim()) {
          return { error: `Found page "${title}" but no text content was available.` };
        }

        // Step 4: Language-aware character cap to protect model context
        const caps = { zh: 1500, fr: 4300, es: 4500, hi: 3000, kn: 2000 };
        const maxChars = caps[lang.toLowerCase()] ?? 5000;
        if (finalResult.length > maxChars) {
          finalResult = finalResult.substring(0, maxChars) + '\n\n... [TRUNCATED TO SAVE CONTEXT]';
        }

        return { title, result: finalResult };
      }

      window['ai_edge_gallery_get_result'] = async (data) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.topic) return JSON.stringify({ error: 'No topic provided to search.' });
          if (!jsonData.lang)  return JSON.stringify({ error: 'No language code (lang) provided.' });

          const wikiResponse = await fetchWikiFuzzyAndInfobox(jsonData.topic, jsonData.lang);
          return JSON.stringify(wikiResponse);
        } catch (e) {
          console.error('Gemma Pocket Assistant Wikipedia error:', e);
          return JSON.stringify({ error: `Failed to query Wikipedia: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
