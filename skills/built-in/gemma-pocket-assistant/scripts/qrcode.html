<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma Pocket Assistant — QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
</head>
<body>
    <!-- Hidden rendering surfaces -->
    <div id="qrcode-container" style="display:none;"></div>
    <canvas id="qr-canvas" style="display:none;"></canvas>

    <script>
        /**
         * Gemma Pocket Assistant — QR Code Module
         * Generates a QR code from a URL or text string and returns it as a
         * base64-encoded PNG image for the AI Edge Gallery chat to render.
         *
         * Parameters (via JSON data string from LLM):
         *   url   {string} - The URL or text to encode. Required.
         *   label {string} - Human-readable label (logged, not encoded). Optional.
         *   shape {string} - "square" (default) or "circle". Optional.
         */
        window['ai_edge_gallery_get_result'] = async function(data) {
            try {
                const params = JSON.parse(data);
                let url = params.url;
                const label = params.label || '';
                const shape = params.shape || 'square';

                if (!url) throw new Error('URL or text is required to generate a QR code.');

                // Auto-prepend https:// if bare domain provided
                if (url && !url.startsWith('http://') && !url.startsWith('https://') && url.includes('.')) {
                    url = 'https://' + url;
                }

                console.log(`Gemma Pocket Assistant: Generating QR for "${label || url}" (shape: ${shape})`);

                // Clear previous renders
                const container = document.getElementById('qrcode-container');
                container.innerHTML = '';

                // Wait for qrcodejs CDN to load (it's deferred)
                await new Promise((resolve) => {
                    const check = setInterval(() => {
                        if (typeof QRCode !== 'undefined') {
                            clearInterval(check);
                            resolve();
                        }
                    }, 50);
                    setTimeout(() => { clearInterval(check); resolve(); }, 5000);
                });

                if (typeof QRCode === 'undefined') {
                    throw new Error('QR Code library failed to load. Check internet connection.');
                }

                // Generate QR using qrcodejs
                new QRCode(container, {
                    text: url,
                    width: 512,
                    height: 512,
                    correctLevel: QRCode.CorrectLevel.H,
                });

                // Wait for the canvas/img element to be rendered
                const qrElement = await new Promise((resolve, reject) => {
                    let attempts = 0;
                    const check = setInterval(() => {
                        const canvas = container.querySelector('canvas');
                        const img    = container.querySelector('img');
                        if (canvas) {
                            clearInterval(check);
                            resolve(canvas);
                        } else if (img && img.src && img.src.length > 10) {
                            clearInterval(check);
                            resolve(img);
                        }
                        if (++attempts > 120) { // 6-second timeout
                            clearInterval(check);
                            reject(new Error('QR generation timed out. Try again.'));
                        }
                    }, 50);
                });

                // Composite onto our own canvas (supports circle clipping)
                const finalCanvas = document.getElementById('qr-canvas');
                const ctx = finalCanvas.getContext('2d');
                finalCanvas.width  = 512;
                finalCanvas.height = 512;
                ctx.clearRect(0, 0, 512, 512);

                // White background
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, 512, 512);

                if (shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(256, 256, 250, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.clip();
                }

                ctx.drawImage(qrElement, 0, 0, 512, 512);

                const base64 = finalCanvas.toDataURL('image/png');

                return JSON.stringify({
                    result: `QR code generated successfully for: ${url}${label ? ' (' + label + ')' : ''}`,
                    image: { base64 },
                    error: null,
                });

            } catch (err) {
                console.error('Gemma Pocket Assistant QR error:', err);
                return JSON.stringify({ result: null, image: null, error: err.message });
            }
        };
    </script>
</body>
</html>
