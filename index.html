<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemma AI Edge Skill Collection</title>
  <meta http-equiv="refresh" content="0; url=gallery/" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #060b18;
      color: #94a3b8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #111d35;
      border: 1px solid rgba(99, 179, 237, 0.12);
      border-radius: 18px;
      padding: 40px 32px;
      max-width: 400px;
    }
    h1 { font-size: 1.5rem; color: #e2e8f0; margin-bottom: 12px; }
    p { font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }
    a {
      display: inline-block;
      color: #fff;
      background: linear-gradient(135deg, #4285f4, #38bdf8);
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(66, 133, 244, 0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ Gemma AI Edge Skill Collection</h1>
    <p>Redirecting you to the skill gallery…</p>
    <a href="gallery/">Go to Gallery</a>
  </div>
</body>
</html>
